<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn To PR</title>
    <link rel="stylesheet" href="src/css/style.css">
    <script type="module" src="src/js/index.js"></script>
</head>
<body>
    <div id="root"></div>

    <script>
        fetch('contributors.json')
            .then(response => response.json())
            .then(contributors => {
                const contributorsDiv = document.createElement('div');
                contributorsDiv.id = 'contributors';
                contributorsDiv.innerHTML = '<h2>Contributors</h2>';

                contributors.forEach(contributor => {
                    const contributorElement = document.createElement('div');
                    contributorElement.className = 'contributor';

                    const avatar = document.createElement('img');
                    avatar.src = contributor.avatar_url;
                    avatar.alt = contributor.login;
                    avatar.width = 50;
                    avatar.height = 50;
                    contributorElement.appendChild(avatar);

                    const link = document.createElement('a');
                    link.href = contributor.html_url;
                    link.textContent = contributor.login;
                    contributorElement.appendChild(link);

                    contributorsDiv.appendChild(contributorElement);
                });

                document.getElementById('root').appendChild(contributorsDiv);
            })
            .catch(error => console.error('Error fetching contributors:', error));
    </script>
</body>
</html>
