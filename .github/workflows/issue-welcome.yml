name: Auto Issue Welcome Message

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Add welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNo = context.issue.number;
            const msg = `👋 Thank you for opening an issue!

              Welcome to **OpenSource Playground** 🚀

              We appreciate your contribution.  
              A maintainer will review this issue soon.

              ### 📚 While waiting you can:
              - Read the contribution guide
              - Explore beginner-friendly issues
              - Try your first pull request

              Happy Coding! 🎉`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issueNo,
              body: msg
            });
