name: Auto label Issues

on:
  issues:
    types: [opened, reopened, edited]

permissions:
  issues: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Run Gemini Labeler
        id: gemini_call
        uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          input_prompt: |
            Analyze this GitHub issue.

            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Available labels:
            bug, enhancement, documentation, question, help wanted, good first issue

            Choose the 1 or 2 most relevant labels.
            Return ONLY comma-separated labels.

      - name: Apply Labels
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = [
              "bug",
              "enhancement",
              "documentation",
              "question",
              "help wanted",
              "good first issue"
            ];

            const output = `${{ steps.gemini_call.outputs.response }}`;

            const labels = output
              .split(',')
              .map(l => l.trim())
              .filter(l => allowed.includes(l));

            if (labels.length === 0) {
              console.log("No valid labels returned.");
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels
            });
